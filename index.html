<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>HW1-2 策略顯示與價值評估</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <main class="wrap">
      <h1>HW1-2 策略顯示與價值評估</h1>
      <p class="lead">產生 n x n 格子，隨機策略顯示（箭頭）與策略評估 (Value Matrix)</p>

      <div class="controls">
        <label>Grid size (3–10): <input id="nInput" type="number" min="3" max="10" value="6"></label>
        <button id="gen">Generate Grid</button>
        <button id="randPolicy">Random Policy</button>
        <button id="eval">Evaluate Policy</button>
        <button id="reset">Reset</button>
      </div>

      <div class="matrices">
        <div class="panel">
          <h2>Value Matrix</h2>
          <div id="value" class="matrix"></div>
        </div>
        <div class="panel">
          <h2>Policy Matrix</h2>
          <div id="policy" class="matrix"></div>
        </div>
      </div>

      <p class="notes">操作說明：先點 Generate Grid，然後 Random Policy 即可看到箭頭；Evaluate Policy 會計算每格的 V(s)。牆格預設為無，您也可以手動在程式中加入障礙或改 reward/gamma。</p>
    </main>

    <script src="script.js"></script>
  </body>
</html>
